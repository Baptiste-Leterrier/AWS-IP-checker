<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS IP Range Resolver</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="https://umami-u80.baptiste-leterrier.com/script.js" data-website-id="bd8c8b7a-7640-4e72-ab9d-f82fb02b40fa"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 font-sans">
    
    <div class="p-4 md:p-8">
        <div class="max-w-4xl mx-auto space-y-6">
            
            <!-- Header -->
            <div class="text-center space-y-2 mb-10">
                <div class="flex justify-center mb-4">
                    <div class="bg-blue-600 p-3 rounded-2xl shadow-lg">
                        <i data-lucide="globe" class="w-8 h-8 text-white"></i>
                    </div>
                </div>
                <h1 class="text-3xl md:text-4xl font-extrabold text-slate-900 tracking-tight">
                    AWS IP Range Resolver
                </h1>
                <p class="text-slate-500 max-w-xl mx-auto">
                    Locate the associated AWS Region and Service for any IP address. Data is fetched automatically from AWS.
                </p>
            </div>

            <!-- Loading State -->
            <div id="loading-state" class="bg-white p-12 rounded-2xl shadow-sm border border-slate-200 text-center">
                <div class="flex flex-col items-center justify-center space-y-4">
                    <i data-lucide="loader-2" class="w-10 h-10 text-blue-600 animate-spin"></i>
                    <h2 class="text-xl font-semibold text-slate-700">Fetching latest AWS IP Ranges...</h2>
                    <p class="text-slate-500 text-sm max-w-md mx-auto" id="loading-text">
                        Connecting to ip-ranges.amazonaws.com
                    </p>
                </div>
            </div>

            <!-- Error State -->
            <div id="error-state" class="hidden bg-white p-8 rounded-2xl shadow-sm border border-red-200 text-center">
                <div class="flex flex-col items-center justify-center space-y-3">
                    <i data-lucide="alert-circle" class="w-12 h-12 text-red-500"></i>
                    <h2 class="text-lg font-semibold text-red-700">Failed to load data</h2>
                    <p id="error-message" class="text-red-500 text-sm"></p>
                    <button onclick="fetchAwsData()" class="mt-4 px-6 py-2 bg-red-50 text-red-700 rounded-lg font-medium hover:bg-red-100 transition-colors">
                        Try Again
                    </button>
                </div>
            </div>

            <!-- Main App Area (Hidden until loaded) -->
            <div id="main-app" class="hidden space-y-6">
                
                <!-- Status Bar -->
                <div class="flex flex-col md:flex-row justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-slate-200 text-sm">
                    <div class="flex items-center gap-2 text-emerald-600 font-medium">
                        <i data-lucide="shield-check" class="w-5 h-5"></i>
                        Data Loaded Successfully
                    </div>
                    <div class="text-slate-500 flex gap-4 mt-2 md:mt-0">
                        <span>IPv4: <strong id="ipv4-count" class="text-slate-700">0</strong></span>
                        <span>IPv6: <strong id="ipv6-count" class="text-slate-700">0</strong></span>
                    </div>
                    <div class="text-slate-400 text-xs mt-2 md:mt-0" id="sync-date"></div>
                </div>

                <!-- Search Box -->
                <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200">
                    <form id="search-form" class="flex flex-col sm:flex-row gap-3">
                        <div class="relative flex-1">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i data-lucide="search" class="h-5 w-5 text-slate-400"></i>
                            </div>
                            <input
                                type="text"
                                id="search-input"
                                placeholder="Enter an IPv4 or IPv6 address (e.g., 3.4.12.4)"
                                class="block w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                            />
                        </div>
                        <button
                            type="submit"
                            id="search-button"
                            disabled
                            class="px-8 py-3 bg-slate-900 text-white rounded-xl font-medium hover:bg-slate-800 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                        >
                            Search
                        </button>
                    </form>
                </div>

                <!-- Results Area -->
                <div id="results-area" class="hidden space-y-4">
                    <h3 class="text-lg font-semibold text-slate-900 flex items-center gap-2">
                        Results for "<span id="searched-ip"></span>"
                        <span id="match-count" class="bg-slate-200 text-slate-700 text-xs py-1 px-2 rounded-full"></span>
                    </h3>

                    <div id="results-container" class="grid gap-4">
                        <!-- Results will be injected here via JS -->
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Application Logic -->
    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // App State
        let fileData = null;

        // --- IP Matching Logic ---

        function isIp4InCidr(ip, cidr) {
            if (!ip || !cidr || !ip.includes('.')) return false;
            const [range, bitsStr] = cidr.split('/');
            if (!range || !bitsStr) return false;

            const ipParts = ip.split('.');
            const rangeParts = range.split('.');
            if (ipParts.length !== 4 || rangeParts.length !== 4) return false;

            try {
                const ipBin = ipParts.map(x => parseInt(x, 10).toString(2).padStart(8, '0')).join('');
                const rangeBin = rangeParts.map(x => parseInt(x, 10).toString(2).padStart(8, '0')).join('');
                const bits = parseInt(bitsStr, 10);
                return ipBin.substring(0, bits) === rangeBin.substring(0, bits);
            } catch (e) {
                return false;
            }
        }

        function expandIPv6(ip) {
            let [full] = ip.split('%'); // ignore zone indices
            let sides = full.split('::');
            if (sides.length > 2) return null;

            let left = sides[0] ? sides[0].split(':') : [];
            let right = sides[1] ? sides[1].split(':') : [];
            let missing = 8 - (left.length + right.length);

            if (sides.length === 1) {
                missing = 0;
                if (left.length !== 8) return null;
            }

            let zeros = Array(missing).fill('0');
            return [...left, ...zeros, ...right].map(x => parseInt(x || '0', 16));
        }

        function isIp6InCidr(ip, cidr) {
            if (!ip || !cidr || !ip.includes(':')) return false;
            const [range, bitsStr] = cidr.split('/');
            if (!range || !bitsStr) return false;

            const parts = expandIPv6(ip);
            const rangeParts = expandIPv6(range);
            if (!parts || !rangeParts) return false;

            try {
                const ipBin = parts.map(x => x.toString(2).padStart(16, '0')).join('');
                const rangeBin = rangeParts.map(x => x.toString(2).padStart(16, '0')).join('');
                const bits = parseInt(bitsStr, 10);
                return ipBin.substring(0, bits) === rangeBin.substring(0, bits);
            } catch (e) {
                return false;
            }
        }

        // --- Data Fetching ---

        async function fetchAwsData() {
            const loadingState = document.getElementById('loading-state');
            const errorState = document.getElementById('error-state');
            const mainApp = document.getElementById('main-app');
            const loadingText = document.getElementById('loading-text');

            loadingState.classList.remove('hidden');
            errorState.classList.add('hidden');
            mainApp.classList.add('hidden');
            
            const targetUrl = 'https://ip-ranges.amazonaws.com/ip-ranges.json';
            const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`;
            
            let json = null;

            try {
                // Attempt 1: Direct Fetch (Will fail in standard browsers due to CORS, but good if extensions/flags are used)
                try {
                    const response = await fetch(targetUrl);
                    if (!response.ok) throw new Error("Direct fetch failed");
                    json = await response.json();
                } catch (directError) {
                    // Attempt 2: Fallback to CORS Proxy
                    loadingText.innerText = 'CORS blocked direct access. Using secure proxy to fetch AWS data...';
                    const proxyResponse = await fetch(proxyUrl);
                    if (!proxyResponse.ok) throw new Error('Proxy fetch failed');
                    json = await proxyResponse.json();
                }

                if (!json || (!json.prefixes && !json.ipv6_prefixes)) {
                    throw new Error('Invalid JSON format received.');
                }

                // Store data
                fileData = {
                    prefixes: json.prefixes || [],
                    ipv6_prefixes: json.ipv6_prefixes || [],
                    syncToken: json.syncToken,
                    createDate: json.createDate
                };

                // Update UI
                document.getElementById('ipv4-count').innerText = fileData.prefixes.length.toLocaleString();
                document.getElementById('ipv6-count').innerText = fileData.ipv6_prefixes.length.toLocaleString();
                document.getElementById('sync-date').innerText = `Updated: ${fileData.createDate}`;

                loadingState.classList.add('hidden');
                mainApp.classList.remove('hidden');

            } catch (error) {
                loadingState.classList.add('hidden');
                errorState.classList.remove('hidden');
                document.getElementById('error-message').innerText = error.message;
            }
        }

        // --- UI Interactions ---

        const searchInput = document.getElementById('search-input');
        const searchButton = document.getElementById('search-button');
        const searchForm = document.getElementById('search-form');

        searchInput.addEventListener('input', (e) => {
            searchButton.disabled = e.target.value.trim() === '';
        });

        searchForm.addEventListener('submit', (e) => {
            e.preventDefault();
            if (!fileData) return;

            const ip = searchInput.value.trim();
            if (!ip) return;

            const isV6 = ip.includes(':');
            const isV4 = ip.includes('.');
            
            let matches = [];

            if (isV4) {
                matches = fileData.prefixes.filter(prefix => isIp4InCidr(ip, prefix.ip_prefix));
            } else if (isV6) {
                matches = fileData.ipv6_prefixes.filter(prefix => isIp6InCidr(ip, prefix.ipv6_prefix));
            }

            // Sort by most specific prefix (highest number after the slash)
            matches.sort((a, b) => {
                const getBits = (obj) => parseInt((obj.ip_prefix || obj.ipv6_prefix).split('/')[1], 10);
                return getBits(b) - getBits(a);
            });

            renderResults(ip, matches);
        });

        function renderResults(ip, matches) {
            const resultsArea = document.getElementById('results-area');
            const resultsContainer = document.getElementById('results-container');
            const searchedIpSpan = document.getElementById('searched-ip');
            const matchCountSpan = document.getElementById('match-count');

            searchedIpSpan.innerText = ip;
            matchCountSpan.innerText = `${matches.length} ${matches.length === 1 ? 'match' : 'matches'}`;
            resultsArea.classList.remove('hidden');
            resultsContainer.innerHTML = '';

            if (matches.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="bg-white p-8 rounded-2xl border border-slate-200 text-center shadow-sm">
                        <i data-lucide="alert-circle" class="w-10 h-10 text-slate-400 mx-auto mb-3"></i>
                        <h4 class="text-lg font-medium text-slate-900">No matches found</h4>
                        <p class="text-slate-500 mt-1">This IP address does not belong to any known AWS service block.</p>
                    </div>
                `;
            } else {
                matches.forEach((match, idx) => {
                    const isMostSpecific = idx === 0 && matches.length > 1;
                    const cidr = match.ip_prefix || match.ipv6_prefix;
                    const borderGroupStr = match.network_border_group 
                        ? `<p class="text-xs text-slate-500 mt-2">Border Group: ${match.network_border_group}</p>` 
                        : '';
                    
                    const specificBadge = isMostSpecific ? `
                        <div class="inline-flex items-center gap-1.5 text-xs font-semibold text-blue-700 bg-blue-50 px-2.5 py-1 rounded-md mb-3">
                            <i data-lucide="check" class="w-3.5 h-3.5"></i>
                            Most Specific Match
                        </div>
                    ` : '';

                    const cardHtml = `
                        <div class="bg-white p-6 rounded-2xl border shadow-sm flex flex-col md:flex-row md:items-center justify-between gap-4 ${isMostSpecific ? 'border-blue-200 ring-1 ring-blue-50' : 'border-slate-200'}">
                            <div class="flex-1">
                                ${specificBadge}
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-y-4 gap-x-8">
                                    <div>
                                        <p class="text-sm font-medium text-slate-500 flex items-center gap-1.5 mb-1">
                                            <i data-lucide="server" class="w-4 h-4"></i> Service
                                        </p>
                                        <p class="text-lg font-bold text-slate-900">${match.service}</p>
                                    </div>
                                    <div>
                                        <p class="text-sm font-medium text-slate-500 flex items-center gap-1.5 mb-1">
                                            <i data-lucide="map-pin" class="w-4 h-4"></i> Region
                                        </p>
                                        <p class="text-lg font-bold text-slate-900">${match.region}</p>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="md:w-64 bg-slate-50 rounded-xl p-4 border border-slate-100 flex flex-col justify-center mt-4 md:mt-0">
                                <p class="text-xs font-medium text-slate-500 mb-1 flex items-center gap-1.5">
                                    <i data-lucide="database" class="w-3.5 h-3.5"></i> CIDR Block
                                </p>
                                <p class="font-mono text-sm font-semibold text-slate-800 break-all">
                                    ${cidr}
                                </p>
                                ${borderGroupStr}
                            </div>
                        </div>
                    `;
                    resultsContainer.insertAdjacentHTML('beforeend', cardHtml);
                });
            }

            // Re-initialize icons for the newly injected HTML
            lucide.createIcons();
        }

        // Start fetching data immediately on load
        fetchAwsData();
    </script>
</body>
</html>
